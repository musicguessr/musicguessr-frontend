name: Frontend CI

on:
  push:
    paths:
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig*.json'
      - 'jest.config.js'
      - '.github/workflows/frontend.yml'
  pull_request:
    paths:
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig*.json'
      - 'jest.config.js'
      - '.github/workflows/frontend.yml'

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      - name: ESLint
        run: npm run lint
      - name: Prettier
        run: npm run format:check

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      - name: Run tests
        run: npm test -- --no-coverage

  build:
    name: Build & Prerender
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      - name: Build
        run: npm run build
      - name: Verify prerendered routes
        run: |
          grep -q 'ng-server-context="ssg"' dist/frontend/browser/index.html
          test -f dist/frontend/browser/create-deck/index.html
          grep -q 'ng-server-context="ssg"' dist/frontend/browser/create-deck/index.html
