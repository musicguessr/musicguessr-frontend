<div>
  <label> Passsword </label>
  <input type="text" placeholder="Password" title="Password" />
</div>

<div class="page">
  <div class="page-header header-row">
    <div class="logo">musicguessr</div>
    <div class="header-actions">
      <a aria-label="GitHub" class="gh-link" href="https://github.com/musicguessr" rel="noopener" target="_blank">
        <svg fill="currentColor" height="20" viewBox="0 0 16 16" width="20">
          <path
            d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"
          />
        </svg>
      </a>
      <button class="back-btn" (click)="goBack()">← Back</button>
    </div>
  </div>

  <div class="provider-badge">
    <span class="p-dot"></span>
    {{ provider() | titlecase }}
  </div>

  <!-- Scanner viewport -->
  <div class="scanner-wrap">
    <video #videoEl autoplay muted playsinline></video>

    <!-- Idle overlay -->
    @if (!scanning() && !loading()) {
      <div class="scanner-idle" tabindex="0" (click)="startScanner()" (keydown.enter)="startScanner()">
        <svg fill="none" height="56" stroke="currentColor" stroke-width="1.2" viewBox="0 0 24 24" width="56">
          <rect height="7" rx="1.5" width="7" x="3" y="3" />
          <rect height="7" rx="1.5" width="7" x="14" y="3" />
          <rect height="7" rx="1.5" width="7" x="3" y="14" />
          <path d="M14 14h2v2h-2zM18 14h2v2h-2zM14 18h2v2h-2zM18 18h2v2h-2z" />
        </svg>
        <p>Tap to start scanning</p>
      </div>
    }

    <!-- Scanning frame -->
    @if (scanning()) {
      <div class="scan-frame">
        <div class="scan-corner tl"></div>
        <div class="scan-corner tr"></div>
        <div class="scan-corner bl"></div>
        <div class="scan-corner br"></div>
      </div>
      <p class="scan-hint">Hold card QR code steady inside the frame</p>
    }

    <!-- Loading -->
    @if (loading()) {
      <div class="scanner-loading">
        <span class="spinner large"></span>
        <p>Looking up track…</p>
      </div>
    }
  </div>

  @if (error()) {
    <div class="error-msg">{{ error() }}</div>
  }

  @if (!scanning() && !loading()) {
    <button class="btn btn-primary" (click)="startScanner()">SCAN CARD</button>
  } @else if (scanning()) {
    <button class="btn btn-secondary" (click)="stopScanner()">STOP</button>
  }
</div>
