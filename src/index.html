  <head>
    <meta charset="utf-8" />

    <!-- Favicon -->

      type="image/svg+xml"
    />

    <!-- Primary meta -->
    <title>musicguessr — Play Hitster cards with YouTube, Spotify & Apple Music</title>
    <meta
      content="Play any Hitster card with YouTube, Spotify or Apple Music — no subscription lock-in. Scan QR codes, guess the year, create and share custom music quiz decks."
      name="description"
    />
    <meta
      content="hitster, music quiz, guess the year, hitster online, musicguessr, youtube music game, spotify music quiz, custom deck, music card game"
      name="keywords"
    />
    <meta content="musicguessr" name="author" />
    <meta content="index,follow" name="robots" />
    <link href="__SITE_URL__" rel="canonical" />

    <!-- Google Analytics 4 — injected only when GA_MEASUREMENT_ID env var is set -->
    <script>
      (function () {
        var id = '__GA_MEASUREMENT_ID__';
        if (!id) return;

        s.async = true;
        s.src = 'https://www.googletagmanager.com/gtag/js?id=' + id;
        document.head.appendChild(s);
        window.dataLayer = window.dataLayer || [];
        function gtag() {
          dataLayer.push(arguments);
        }
        window.gtag = gtag;
        gtag('js', new Date());
        gtag('config', id);
      })();
    </script>

    <!-- Structured data: WebApplication (Schema.org) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "musicguessr",
        "url": "__SITE_URL__",
        "description": "Play any Hitster card with YouTube, Spotify or Apple Music. Scan QR codes, guess the year, and create custom music quiz decks — no subscription lock-in.",
        "applicationCategory": "GameApplication",
        "operatingSystem": "Any",
        "browserRequirements": "Requires JavaScript. Requires a modern browser with camera access for QR scanning.",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        },
        "featureList": [
          "YouTube playback — no account required",
          "Spotify Web Playback SDK integration",
          "Apple Music via MusicKit JS",
          "QR code scanner for Hitster cards",
          "Custom deck creator with YouTube playlist import",
          "Shareable deck links with QR codes",
          "Progressive Web App — installable on mobile"
        ],
        "screenshot": "__SITE_URL__/assets/og-image.png",
        "creator": {
          "@type": "Organization",
          "name": "musicguessr",
          "url": "__SITE_URL__"
        }
      }
    </script>

    <!-- Structured data: HowTo (Schema.org) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "HowTo",
        "name": "How to play Hitster online with YouTube",
        "description": "Use musicguessr to play Hitster card game in your browser using YouTube — no Spotify required.",
        "step": [
          {
            "@type": "HowToStep",
            "position": 1,
            "name": "Choose a music service",
            "text": "Open musicguessr and select YouTube (free, no login), Spotify, or Apple Music as your playback provider."
          },
          {
            "@type": "HowToStep",
            "position": 2,
            "name": "Scan a Hitster card",
            "text": "Point your camera at the QR code on any Hitster card. The app identifies the track instantly."
          },
          {
            "@type": "HowToStep",
            "position": 3,
            "name": "Tap to play",
            "text": "Tap the play button. The song starts in your browser — no app switching needed."
          },
          {
            "@type": "HowToStep",
            "position": 4,
            "name": "Guess the year",
            "text": "Listen to the track, guess the release year, then tap to reveal the answer and place the card on your timeline."
          }
        ],
        "tool": [
          { "@type": "HowToTool", "name": "Hitster card game" },
          { "@type": "HowToTool", "name": "Smartphone with camera" }
        ]
      }
    </script>

    <!-- Structured data: FAQPage (Schema.org) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "Can I play Hitster without Spotify?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes. musicguessr lets you play Hitster cards using YouTube — completely free, no Spotify account or Premium subscription required. Just choose YouTube when starting the game."
            }
          },
          {
            "@type": "Question",
            "name": "How does musicguessr work with Hitster cards?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Open musicguessr in your browser, select a music service, then scan the QR code on any Hitster card with your phone camera. The matching track plays automatically in your browser."
            }
          },
          {
            "@type": "Question",
            "name": "Does musicguessr work on iPhone and Android?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes. musicguessr is a Progressive Web App optimised for iOS Safari and Android Chrome. It works directly in the browser — no app download required. You can also install it on your home screen."
            }
          },
          {
            "@type": "Question",
            "name": "Can I create my own Hitster-style music quiz?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes. Use the Create Deck page to build a custom music quiz from YouTube videos or an entire YouTube playlist. Share it with friends via a link or QR code — no account needed."
            }
          },
          {
            "@type": "Question",
            "name": "Is musicguessr free?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "musicguessr is completely free and open source. YouTube playback requires no subscription. Spotify playback requires a Spotify Premium account. Apple Music playback requires an Apple Music subscription."
            }
          }
        ]
      }
    </script>
