worker_processes auto;
pid /tmp/nginx.pid;
error_log /dev/stderr warn;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  access_log /dev/stdout;
  sendfile on;
  keepalive_timeout 65;
  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

  # Temp dirs writable by non-root user
  client_body_temp_path /tmp/nginx_client 1 2;
  proxy_temp_path       /tmp/nginx_proxy;
  fastcgi_temp_path     /tmp/nginx_fastcgi;
  uwsgi_temp_path       /tmp/nginx_uwsgi;
  scgi_temp_path        /tmp/nginx_scgi;

  server {
    listen 8080;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Angular SPA routing
    location / {
      try_files $uri $uri/ /index.html;
    }

    # config.json — allow mounting custom config at runtime
    location = /config.json {
      add_header Cache-Control "no-cache, no-store, must-revalidate";
      try_files $uri =404;
    }

    # SEO / crawler files — no-cache so runtime-injected values are always fresh
    location = /robots.txt {
      add_header Content-Type "text/plain; charset=utf-8";
      add_header Cache-Control "no-cache, no-store, must-revalidate";
      try_files $uri =404;
    }

    location = /sitemap.xml {
      add_header Content-Type "application/xml; charset=utf-8";
      add_header Cache-Control "no-cache, no-store, must-revalidate";
      try_files $uri =404;
    }

    location = /llms.txt {
      add_header Content-Type "text/plain; charset=utf-8";
      add_header Cache-Control "public, max-age=86400";
      try_files $uri =404;
    }

    # Cache hashed assets forever
    location ~* \.[0-9a-f]+\.(js|css|woff2|woff|png|jpg|svg|ico)$ {
      expires 1y;
      add_header Cache-Control "public, immutable";
    }
  }
}
